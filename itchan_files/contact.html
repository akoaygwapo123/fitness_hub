<!DOCTYPE html>
<html>
<head>
    <title>Fitness Hub - Contact Us</title>
    <style>
        body { 
          background-color: black; 
          color: white; 
          font-family: 'Segoe UI', Arial, sans-serif; 
          margin: 0; 
          text-align: center; 
        }

        nav { 
          background-color: #FF9900; 
          padding: 15px; 
          position: sticky;
          top: 0;
          z-index: 1000;
        }

        nav a { 
          color: black; 
          margin: 0 10px; 
          text-decoration: none; 
          font-weight: bold; 
        }

        nav a:hover { color: white; }

        .label-text {
            color: #FF9900;
            font-weight: bold;
            text-transform: uppercase;
        }

        .contact-wrapper {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            padding: 40px 20px;
            max-width: 1000px;
            margin: auto;
        }

        .contact-info { 
          flex: 1;
          min-width: 300px;
          text-align: left;
          background: #111;
          padding: 30px;
          border-left: 5px solid #FF9900;
          border-radius: 10px;
        }

        .contact-form {
            flex: 1;
            min-width: 300px;
            background: #111;
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        input, textarea {
            width: 100%;
            margin-bottom: 15px;
            padding: 12px;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
        }

        input[type="submit"] {
            background: #FF9900;
            color: black;
            font-weight: bold;
            padding: 15px;
            width: 100%;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        input[type="submit"]:hover {
            background: white;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a> 
        <a href="about.html">About</a> 
        <a href="gallery.html">Gallery</a>
        <a href="videos.html">Videos</a> 
        <a href="audio.html">Audio</a> 
        <a href="training.html">Training</a>
        <a href="team.html">Team</a> 
        <a href="registration.html">Register</a> 
        <a href="tips.html">Tips</a> 
        <a href="contact.html">Contact</a>
    </nav>

    <h2 style="color: #FF9900; margin-top: 50px;">Questions? Contact Us</h2>

    <div class="contact-wrapper">
        <div class="contact-info">
            <h3 style="color: #FF9900;">Contact Details</h3>
            <p><span class="label-text">Location:</span> CSU Gonzaga Campus, Cagayan</p>
            <p><span class="label-text">Phone:</span> 09927031813 </p>
            <p><span class="label-text">Email:</span> peraltachristian983@gmail.com</p>
            <p><span class="label-text">Hours:</span> Mon-Fri | 8:00 AM - 5:00 PM</p>
        </div>

        <div class="contact-form">
            <form action="success.html">
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email" required>
                <textarea placeholder="Message" required></textarea>
                <input type="submit" value="SEND MESSAGE">
            </form>
        </div>
    </div>
</body>
</html>
